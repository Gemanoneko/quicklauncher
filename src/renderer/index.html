<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' data:; script-src 'self' 'unsafe-inline'">
  <title>QuickLauncher</title>
  <link rel="stylesheet" href="styles/base.css">
  <link id="theme-stylesheet" rel="stylesheet" href="styles/themes/cyberpunk.css">
</head>
<body>
  <div id="app">

    <!-- Header bar (draggable) -->
    <div id="header">
      <div id="title-area">
        <span id="title">QUICK<span class="accent">.</span>LAUNCH</span>
        <span id="header-version"></span>
      </div>
      <div id="header-controls">
        <button id="btn-random-theme" title="Random theme">⚄</button>
        <button id="btn-settings" title="Settings">⚙</button>
        <button id="btn-hide" title="Hide to tray">╌</button>
      </div>
    </div>

    <!-- Main grid -->
    <div id="grid-container">
      <div id="drop-hint" class="hidden">
        <div class="drop-hint-inner">
          <div class="drop-icon">⊕</div>
          <div>DROP .EXE OR .LNK HERE</div>
          <div class="hint-sub">or RIGHT-CLICK to enter edit mode</div>
        </div>
      </div>
      <div id="app-grid"></div>
    </div>

    <!-- Theme flavor banner -->
    <div id="theme-banner">
      <span id="theme-banner-text"></span>
    </div>

    <!-- Edit mode bottom bar -->
    <div id="edit-bar" class="hidden">
      <span class="edit-label">// EDIT MODE</span>
      <div class="edit-actions">
        <button id="btn-add-edit">+ FILE</button>
        <button id="btn-add-installed">+ INSTALLED</button>
        <button id="btn-done-edit">DONE</button>
      </div>
    </div>

    <!-- Update banner (hidden by default) -->
    <div id="update-banner" class="hidden">
      <span id="update-text"></span>
      <div id="update-actions"></div>
    </div>

  </div>

  <!-- Settings overlay -->
  <div id="settings-overlay" class="overlay hidden">
    <div class="overlay-panel">
      <div class="overlay-title">// SETTINGS</div>

      <div class="setting-row">
        <label for="slider-icon-size">ICON SIZE</label>
        <div class="slider-row">
          <input type="range" id="slider-icon-size" min="32" max="128" step="8" value="64">
          <span id="icon-size-val">64px</span>
        </div>
      </div>

      <div class="setting-row">
        <label class="checkbox-label">
          <input type="checkbox" id="chk-startup" checked>
          <span class="checkmark"></span>
          START WITH WINDOWS
        </label>
      </div>

      <div class="setting-row">
        <label for="theme-select">SKIN</label>
        <select id="theme-select" class="theme-select">
          <option value="cyberpunk">CYBERPUNK</option>
          <option value="blade-runner">BLADE RUNNER</option>
          <option value="alien">ALIEN</option>
          <option value="tron">TRON</option>
          <option value="lcars">LCARS</option>
          <option value="pip-boy">PIP-BOY</option>
          <option value="dune">DUNE</option>
          <option value="x-files">X-FILES</option>
          <option value="mass-effect">MASS EFFECT</option>
          <option value="deus-ex">DEUS EX</option>
          <option value="ghost-shell">GHOST IN THE SHELL</option>
          <option value="matrix">MATRIX</option>
          <option value="warhammer">WARHAMMER 40K</option>
          <option value="dead-space">DEAD SPACE</option>
          <option value="half-life">HALF-LIFE</option>
          <option value="terminator">TERMINATOR</option>
          <option value="portal">PORTAL</option>
          <option value="star-wars-rebel">STAR WARS: REBEL ALLIANCE</option>
          <option value="star-wars-empire">STAR WARS: GALACTIC EMPIRE</option>
          <option value="star-wars-republic">STAR WARS: OLD REPUBLIC</option>
          <option value="doctor-who">DOCTOR WHO</option>
          <option value="akira">AKIRA</option>
          <option value="evangelion">EVANGELION</option>
          <option value="2001">2001: A SPACE ODYSSEY</option>
          <option value="silent-hill">SILENT HILL</option>
          <option value="stalker">S.T.A.L.K.E.R.</option>
          <option value="resident-evil">RESIDENT EVIL</option>
          <option value="the-expanse">THE EXPANSE</option>
          <option value="event-horizon">EVENT HORIZON</option>
        </select>
      </div>

      <div class="setting-row">
        <div class="setting-label">VERSION <span id="app-version" class="accent"></span></div>
      </div>

      <div class="overlay-footer">
        <button id="btn-check-update">CHECK FOR UPDATES</button>
        <button id="btn-close-settings">CLOSE</button>
      </div>
    </div>
  </div>

  <!-- Installed apps picker overlay -->
  <div id="apps-picker" class="overlay hidden">
    <div class="overlay-panel picker-panel">
      <div class="overlay-title">// ADD INSTALLED APP</div>
      <input type="text" id="picker-search" class="picker-search" placeholder="SEARCH..." autocomplete="off" spellcheck="false">
      <div id="picker-loading" class="picker-loading hidden">SCANNING INSTALLED APPS...</div>
      <div id="picker-list"></div>
      <div class="overlay-footer">
        <button id="btn-close-picker">CLOSE</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
